# TinyRadApp CI workflow — version 6
# Workflow changelog:
#   v1 — initial: assembleRelease + bundleRelease + GitHub Release on tags
#   v2 — debug APK only; release jobs commented out pending hardware validation
#   v3 — no job changes; version bump to match app v2.7
#   v4 — release APK re-enabled for v3.0; debug + release; AAB on tags
#   v5 — debug APK removed; release APK + AAB on every push
#   v6 — fixed: build runs unconditionally (removed PR exclusion guard);
#          keystore decode is non-fatal; build.gradle signing hardened against
#          empty env vars; both assembleRelease and bundleRelease in one job

name: TinyRadApp CI

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION:      '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ── Release APK + AAB — runs on EVERY push and PR ─────────────────────────
  # When KEYSTORE_BASE64 secret is absent the build is signed with the debug
  # key (via build.gradle fallback) — the artifact is still produced.
  build-release:
    name: Build Release APK + AAB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version:  ${{ env.JAVA_VERSION }}
          distribution:  ${{ env.JAVA_DISTRIBUTION }}
          cache: gradle

      - run: chmod +x gradlew

      - name: Extract version
        id: ver
        run: |
          NAME=$(grep 'versionName ' app/build.gradle | head -1 \
                   | sed 's/.*versionName[[:space:]]*"\([^"]*\)".*/\1/')
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "Building version: $NAME"

      - name: Decode keystore (optional — skipped if secret absent)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > $RUNNER_TEMP/keystore.jks
            echo "KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks" >> $GITHUB_ENV
            echo "Keystore decoded — release will be signed"
          else
            echo "KEYSTORE_BASE64 secret not set — building with debug key"
          fi

      - name: Build release APK
        env:
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Build release AAB
        env:
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK" \
             app/build/outputs/apk/release/TinyRadApp_v${{ steps.ver.outputs.name }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name:           TinyRadApp_v${{ steps.ver.outputs.name }}-release-apk
          path:           app/build/outputs/apk/release/TinyRadApp_v${{ steps.ver.outputs.name }}.apk
          retention-days: 90

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name:           TinyRadApp_v${{ steps.ver.outputs.name }}-release-aab
          path:           app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

  # ── GitHub Release (v* tags only) ─────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Extract version from tag
        id: ver
        run: echo "name=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: TinyRadApp_v${{ steps.ver.outputs.name }}-release-apk
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          name:  "TinyRadApp v${{ steps.ver.outputs.name }}"
          files: artifacts/*.apk
