# TinyRadApp CI workflow — version 3
# Changes from v1: debug-only build; release/AAB disabled pending hardware validation
#
# Workflow changelog:
#   v1 — initial: assembleRelease + bundleRelease + GitHub Release on tags
#   v2 — debug APK only (assembleDebug); release jobs commented out
#   v3 — no changes to jobs; workflow version bump to match app v2.7
#        until USB communication protocol is confirmed working on hardware

name: TinyRadApp CI

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION:      '17'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version:  ${{ env.JAVA_VERSION }}
          distribution:  ${{ env.JAVA_DISTRIBUTION }}
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Extract version
        id: version
        run: |
          NAME=$(grep 'versionName ' app/build.gradle | head -1 \
                   | sed 's/.*versionName[[:space:]]*"\([^"]*\)".*/\1/')
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "App version: $NAME"

      - name: Run lint (warnings only — does not fail build)
        run: ./gradlew lintDebug --stacktrace
        continue-on-error: true

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace
        continue-on-error: true

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename debug APK with version
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/TinyRadApp_v${{ steps.version.outputs.name }}-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TinyRadApp_v${{ steps.version.outputs.name }}-debug
          path: app/build/outputs/apk/debug/TinyRadApp_v${{ steps.version.outputs.name }}-debug.apk
          retention-days: 30

